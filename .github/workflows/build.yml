name: Build Storage Cleanup Utility

on:
  # Run automatically on every push to main branch
  push:
    branches: [ main ]
  # Also allow running manually from the Actions tab
  workflow_dispatch:

jobs:
  build-windows-exe:
    # Use a 64-bit Windows runner provided by GitHub
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (64-bit)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.11.1 send2trash==1.8.3 pywin32==308

      - name: Build single-file executable with PyInstaller
        run: |
          pyinstaller --onefile --windowed --noconfirm ^
            --name "Storage_Cleanup_Utility" ^
            --hidden-import "send2trash" ^
            --hidden-import "win32com" ^
            --hidden-import "win32com.client" ^
            --hidden-import "pywintypes" ^
            --collect-all "send2trash" ^
            storage_cleanup_utility.py
        shell: cmd

      - name: Verify the exe was produced
        run: |
          dir dist
        shell: cmd

      - name: Upload the executable as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Storage_Cleanup_Utility
          path: dist/Storage_Cleanup_Utility.exe
          if-no-files-found: error
          retention-days: 30
